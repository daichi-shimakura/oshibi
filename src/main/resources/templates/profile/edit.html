<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロフィール編集 - おしび</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .form-card {
            max-width: 600px;
            margin: 60px auto;
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 2rem;
        }
        .form-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
        }
        .section-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #6c757d;
            border-bottom: 1px solid #dee2e6;
            padding-bottom: 4px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/lives">おしび（仮）</a>
    </div>
</nav>

<div class="container">
    <div class="form-card">
        <div class="form-title">プロフィール登録</div>

        <form th:action="@{/profile/edit}" th:object="${profileFormDto}" method="post">

            <!-- グローバルエラー -->
            <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger mb-3">
                <p th:each="error : ${#fields.globalErrors()}" th:text="${error}" class="mb-0"></p>
            </div>

            <!-- 共通情報 -->
            <div class="section-label">基本情報</div>

            <div class="mb-3">
                <label class="form-label">表示名<span class="text-danger">*</span></label>
                <input type="text" class="form-control" th:field="*{displayName}">
                <div th:if="${#fields.hasErrors('displayName')}" class="text-danger small mt-1">
                    <p th:each="error : ${#fields.errors('displayName')}" th:text="${error}" class="mb-0"></p>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">自己紹介</label>
                <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                <div th:if="${#fields.hasErrors('description')}" class="text-danger small mt-1">
                    <p th:each="error : ${#fields.errors('description')}" th:text="${error}" class="mb-0"></p>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">プロフィール画像URL</label>
                <input type="text" class="form-control" th:field="*{profileImageUrl}">
                <div th:if="${#fields.hasErrors('profileImageUrl')}" class="text-danger small mt-1">
                    <p th:each="error : ${#fields.errors('profileImageUrl')}" th:text="${error}" class="mb-0"></p>
                </div>
            </div>

            <!-- ライブ関係者専用 -->
            <div th:if="${accountType == 'LIVE_STAFF'}">
                <div class="section-label mt-4">芸人・スタッフ情報</div>

                <div class="mb-3">
                    <label class="form-label">ユニット種別</label>
                    <div class="d-flex gap-3">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" th:field="*{unitType}" value="PIN">
                            <label class="form-check-label">ピン</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" th:field="*{unitType}" value="COMBI">
                            <label class="form-check-label">コンビ</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" th:field="*{unitType}" value="TRIO">
                            <label class="form-check-label">トリオ</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" th:field="*{unitType}" value="GROUP">
                            <label class="form-check-label">グループ</label>
                        </div>
                    </div>
                    <div th:if="${#fields.hasErrors('unitType')}" class="text-danger small mt-1">
                        <p th:each="error : ${#fields.errors('unitType')}" th:text="${error}" class="mb-0"></p>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">所属事務所</label>
                    <input type="text" class="form-control" th:field="*{agency}" placeholder="例：サンプルプロダクション">
                    <div th:if="${#fields.hasErrors('agency')}" class="text-danger small mt-1">
                        <p th:each="error : ${#fields.errors('agency')}" th:text="${error}" class="mb-0"></p>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">メンバー名</label>
                    <input type="text" class="form-control" th:field="*{memberNames}" placeholder="例：ボケ:山田太郎/ツッコミ:山田花子">
                    <div th:if="${#fields.hasErrors('memberNames')}" class="text-danger small mt-1">
                        <p th:each="error : ${#fields.errors('memberNames')}" th:text="${error}" class="mb-0"></p>
                    </div>
                </div>
            </div>

            <!-- SNSリンク -->
            <div class="section-label mt-4">SNSリンク</div>

            <div class="mb-3">
                <label class="form-label">X（Twitter）URL</label>
                <input type="text" class="form-control" th:field="*{xUrl}" placeholder="https://x.com/...">
                <div th:if="${#fields.hasErrors('xUrl')}" class="text-danger small mt-1">
                    <p th:each="error : ${#fields.errors('xUrl')}" th:text="${error}" class="mb-0"></p>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Instagram URL</label>
                <input type="text" class="form-control" th:field="*{instagramUrl}" placeholder="https://instagram.com/...">
                <div th:if="${#fields.hasErrors('instagramUrl')}" class="text-danger small mt-1">
                    <p th:each="error : ${#fields.errors('instagramUrl')}" th:text="${error}" class="mb-0"></p>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">YouTube URL</label>
                <input type="text" class="form-control" th:field="*{youtubeUrl}" placeholder="https://youtube.com/...">
                <div th:if="${#fields.hasErrors('youtubeUrl')}" class="text-danger small mt-1">
                    <p th:each="error : ${#fields.errors('youtubeUrl')}" th:text="${error}" class="mb-0"></p>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">TikTok URL</label>
                <input type="text" class="form-control" th:field="*{tiktokUrl}" placeholder="https://tiktok.com/...">
                <div th:if="${#fields.hasErrors('tiktokUrl')}" class="text-danger small mt-1">
                    <p th:each="error : ${#fields.errors('tiktokUrl')}" th:text="${error}" class="mb-0"></p>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Note URL</label>
                <input type="text" class="form-control" th:field="*{noteUrl}" placeholder="https://note.com/...">
                <div th:if="${#fields.hasErrors('noteUrl')}" class="text-danger small mt-1">
                    <p th:each="error : ${#fields.errors('noteUrl')}" th:text="${error}" class="mb-0"></p>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">ポッドキャスト URL</label>
                <input type="text" class="form-control" th:field="*{podcastUrl}">
                <div th:if="${#fields.hasErrors('podcastUrl')}" class="text-danger small mt-1">
                    <p th:each="error : ${#fields.errors('podcastUrl')}" th:text="${error}" class="mb-0"></p>
                </div>
            </div>

            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-dark">保存する</button>
            </div>

        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
