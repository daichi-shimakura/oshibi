<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<body>

<nav th:fragment="header" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/lives}">oshibi</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/lives}">ライブ一覧</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/comedians}">芸人一覧</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('LIVE_STAFF')">
                    <a class="nav-link" th:href="@{/my/lives}">マイライブ</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('LIVE_STAFF')">
                    <a class="nav-link" th:href="@{/lives/new}">＋ ライブ登録</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/account/edit}">アカウント設定</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-link nav-link">ログアウト</button>
                    </form>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/login}">ログイン</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

</body>
</html>
