<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/common :: head}"></th:block>
    <title>ライブ情報登録・編集 - oshibi</title>
    <style>
        .form-section {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .performer-added {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .conditional-field {
            border-left: 3px solid #0d6efd;
            padding-left: 1rem;
            margin-left: 0.5rem;
        }
    </style>
</head>

<body>

<!-- ヘッダーナビ -->
<nav th:replace="~{fragments/common :: header}"></nav>

<div class="container my-4" style="max-width: 800px;">

    <!-- パンくずリスト -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb small">
            <li class="breadcrumb-item"><a th:href="@{/my/lives}">マイライブ</a></li>
            <li class="breadcrumb-item active" th:text="${liveFormDto == null} ? 'ライブ情報登録' : 'ライブ情報編集'"></li>
        </ol>
    </nav>

    <h4 class="mb-4" th:text="${liveFormDto.liveId == null} ? 'ライブ情報登録' : 'ライブ情報編集'"></h4>

    <p class="text-danger small mb-4">※ 会場を新規登録する場合は、先に「新規会場を登録する」から登録してください。</p>

    <form id="liveForm" th:action="@{${liveFormDto.liveId == null ? '/lives/new' : '/lives/' + liveFormDto.liveId + '/edit'}}"
          th:object="${liveFormDto}"
          method="post">

        <!-- グローバルエラー -->
        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger mb-3">
            <p th:each="error : ${#fields.globalErrors()}" th:text="${error}" class="mb-0"></p>
        </div>

        <!-- ========== 基本情報 ========== -->
        <div class="form-section">
            <h5 class="mb-3">基本情報</h5>

            <div class="mb-3">
                <label class="form-label">ライブ名 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" th:field="*{title}" placeholder="例：第15回おもしろネタライブ">
                <div th:if="${#fields.hasErrors('title')}" class="text-danger small mt-1">
                    <p th:each="error : ${#fields.errors('title')}" th:text="${error}" class="mb-0"></p>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">ライブ種別 <span class="text-danger">*</span></label>
                <select class="form-select" th:field="*{liveType}">
                    <option value="">選択してください</option>
                    <option value="NETA">ネタ</option>
                    <option value="TALK">トーク</option>
                    <option value="KIKAKU">企画</option>
                    <option value="YOSEN">賞レース予選</option>
                    <option value="BATTLE">バトルライブ</option>
                    <option value="TANDOKU">単独</option>
                    <option value="TWOMAN">ツーマン</option>
                    <option value="UNIT">ユニットライブ</option>
                    <option value="OTHER">その他</option>
                </select>
                <div th:if="${#fields.hasErrors('liveType')}" class="text-danger small mt-1">
                    <p th:each="error : ${#fields.errors('liveType')}" th:text="${error}" class="mb-0"></p>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">備考・説明</label>
                <textarea class="form-control" th:field="*{description}" rows="4"
                          placeholder="ライブの趣旨、注意事項、ドリンク代の有無など"></textarea>
                <div th:if="${#fields.hasErrors('description')}" class="text-danger small mt-1">
                    <p th:each="error : ${#fields.errors('description')}" th:text="${error}" class="mb-0"></p>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">フライヤーURL</label>
                <input type="url" class="form-control" th:field="*{flyerUrl}"
                       placeholder="例：https://pbs.twimg.com/media/xxxxx.jpg">
                <div class="form-text">X、Instagram等に投稿済みのフライヤー画像URLを貼り付けてください</div>
                <div th:if="${#fields.hasErrors('flyerUrl')}" class="text-danger small mt-1">
                    <p th:each="error : ${#fields.errors('flyerUrl')}" th:text="${error}" class="mb-0"></p>
                </div>
            </div>
        </div>

        <!-- ========== 日時 ========== -->
        <div class="form-section">
            <h5 class="mb-3">日時</h5>

            <div class="mb-3">
                <label class="form-label">開催日 <span class="text-danger">*</span></label>
                <input type="date" class="form-control" th:field="*{date}">
                <div th:if="${#fields.hasErrors('date')}" class="text-danger small mt-1">
                    <p th:each="error : ${#fields.errors('date')}" th:text="${error}" class="mb-0"></p>
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label">開場時間</label>
                    <input type="time" class="form-control" th:field="*{openTime}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">開演時間 <span class="text-danger">*</span></label>
                    <input type="time" class="form-control" th:field="*{startTime}">
                    <div th:if="${#fields.hasErrors('startTime')}" class="text-danger small mt-1">
                        <p th:each="error : ${#fields.errors('startTime')}" th:text="${error}" class="mb-0"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========== チケット情報 ========== -->
        <div class="form-section">
            <h5 class="mb-3">チケット情報</h5>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label">前売料金（円）</label>
                    <input type="number" class="form-control" th:field="*{priceAdvance}" placeholder="例：2000">
                    <div th:if="${#fields.hasErrors('priceAdvance')}" class="text-danger small mt-1">
                        <p th:each="error : ${#fields.errors('priceAdvance')}" th:text="${error}" class="mb-0"></p>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">当日料金（円）</label>
                    <input type="number" class="form-control" th:field="*{priceDoor}" placeholder="例：2500">
                    <div th:if="${#fields.hasErrors('priceDoor')}" class="text-danger small mt-1">
                        <p th:each="error : ${#fields.errors('priceDoor')}" th:text="${error}" class="mb-0"></p>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">チケット取得方法</label>
                <select class="form-select" th:field="*{ticketMethod}">
                    <option value="">選択してください</option>
                    <option value="OKICHIKE">取り置き（置きチケ）</option>
                    <option value="TICKET_SITE">チケットサイト予約</option>
                    <option value="CONVENIENCE">コンビニ発券</option>
                    <option value="DOOR">当日券</option>
                    <option value="OTHER">その他</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">チケット購入URL</label>
                <input type="url" class="form-control" th:field="*{ticketUrl}"
                       placeholder="例：https://liveticket.jp/xxxxx">
                <div class="form-text">チケットサイトのURLを入力してください</div>
                <div th:if="${#fields.hasErrors('ticketUrl')}" class="text-danger small mt-1">
                    <p th:each="error : ${#fields.errors('ticketUrl')}" th:text="${error}" class="mb-0"></p>
                </div>
            </div>
        </div>

        <!-- ========== 配信情報 ========== -->
        <div class="form-section">
            <h5 class="mb-3">配信情報</h5>

            <div class="mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" th:field="*{hasStreaming}" id="hasStreaming">
                    <label class="form-check-label" for="hasStreaming">配信あり</label>
                </div>
            </div>

            <div class="conditional-field">
                <div class="form-text mb-2">配信ありの場合のみ入力</div>
                <div class="mb-3">
                    <label class="form-label">配信料金（円）</label>
                    <input type="number" class="form-control" th:field="*{streamingPrice}" placeholder="例：1500">
                    <div th:if="${#fields.hasErrors('streamingPrice')}" class="text-danger small mt-1">
                        <p th:each="error : ${#fields.errors('streamingPrice')}" th:text="${error}" class="mb-0"></p>
                    </div>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">配信開始日</label>
                        <input type="date" class="form-control" th:field="*{streamingStartDate}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">配信終了日（アーカイブ期限）</label>
                        <input type="date" class="form-control" th:field="*{streamingEndDate}">
                    </div>
                </div>
            </div>
        </div>

        <!-- ========== 会場 ========== -->
        <div class="form-section">
            <h5 class="mb-3">会場</h5>
            <div class="mb-3">
                <div class="mb-3 position-relative">
                    <label class="form-label">会場</label>
                    <input type="text" id="venueSearch" class="form-control"
                           placeholder="会場名で検索" autocomplete="off">
                    <div id="venueDropdown"
                         class="list-group position-absolute w-100 shadow"
                         style="z-index:1000; display:none; max-height:200px; overflow-y:auto;">
                    </div>
                    <div id="selectedVenue" class="form-text mt-1 text-dark fw-bold"></div>
                    <input type="hidden" id="venueId" name="venueId" th:value="*{venueId}">
                </div>
                <div class="form-text mt-1">
                    会場が見つからない場合は
                    <a href="javascript:void(0)" onclick="window.open('/venue/new', '_blank')">
                        新しく会場を登録する
                    </a>
                </div>
            </div>
        </div>

        <!-- ========== 出演者 ========== -->
        <div class="form-section">
            <h5 class="mb-3">出演者</h5>

            <div class="mb-3 position-relative">
                <label class="form-label">芸人を検索して追加</label>
                <input type="text" id="performerSearch" class="form-control"
                       placeholder="芸名で検索" autocomplete="off">
                <div id="searchDropdown"
                     class="list-group position-absolute w-100 shadow"
                     style="z-index:1000; display:none; max-height:200px; overflow-y:auto;">
                </div>
            </div>

            <div id="performerList" class="d-flex flex-column gap-2 mb-3"></div>
            <div id="performerInputs"></div>
        </div>

        <!-- ========== 送信ボタン ========== -->
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                    <button th:if="${liveFormDto.liveId != null}"
                            type="submit"
                            form="deleteForm"
                            class="btn btn-outline-danger"
                            onclick="return confirm('このライブを削除しますか？')">このライブを削除</button>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/my/lives}" class="btn btn-outline-secondary">キャンセル</a>
                <button type="button" id="saveBtn" class="btn btn-primary">保存する</button>
            </div>
        </div>

    </form>
    <form th:action="@{/lives/{liveId}/delete(liveId=${liveFormDto.liveId})}"
          method="post"
          id="deleteForm">
    </form>
</div>

<footer th:replace="~{fragments/common :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">
    document.getElementById('saveBtn').addEventListener('click', function() {
        document.getElementById('liveForm').requestSubmit();
    });

    document.getElementById('performerSearch').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            const first = document.querySelector('#searchDropdown .list-group-item');
            if (first) first.click();
        }
    });

    document.getElementById('performerSearch').addEventListener('input', function() {
        const q = this.value;
        if (q.length < 1) return;

        fetch(`/api/comedians/search?q=${q}`)
            .then(res => res.json())
            .then(data => {
                const dropdown = document.getElementById('searchDropdown');
                dropdown.innerHTML = '';
                dropdown.style.display = 'block';

                data.forEach(comedian => {
                    const item = document.createElement('button');
                    item.type = 'button';
                    item.className = 'list-group-item list-group-item-action';
                    item.textContent = `${comedian.displayName}（${comedian.unitType}・${comedian.agency}）`;
                    dropdown.appendChild(item);

                    item.addEventListener('click', function() {
                        addPerformer(comedian.accountId, comedian.displayName);
                        dropdown.style.display = 'none';
                        document.getElementById('performerSearch').value = '';
                    });
                });

                const guestItem = document.createElement('button');
                guestItem.type = 'button';
                guestItem.className = 'list-group-item list-group-item-action text-muted';
                guestItem.textContent = `"${q}"をアカウントなしで追加`;
                dropdown.appendChild(guestItem);

                guestItem.addEventListener('click', function() {
                    addPerformer(null, q);
                    dropdown.style.display = 'none';
                    document.getElementById('performerSearch').value = '';
                });
            });
    });

    let performerIndex = 0;
    const addedAccountIds = new Set();

    function addPerformer(accountId, displayName) {
        if (accountId !== null && addedAccountIds.has(accountId)) return;
        if (accountId !== null) addedAccountIds.add(accountId);

        const list = document.getElementById('performerList');
        const label = document.createElement('div');
        label.className = 'performer-added';
        label.innerHTML = `
        <span>${displayName}</span>
        <button type="button" class="btn btn-sm btn-outline-danger">削除</button>`;
        list.appendChild(label);

        const inputs = document.getElementById('performerInputs');
        const hidden = document.createElement('input');
        const hiddenName = document.createElement('input');
        hidden.type = 'hidden';
        hiddenName.type = 'hidden';
        if(accountId != null) {
            hidden.name = `performerAdds[${performerIndex}].accountId`;
            hidden.value = accountId;

            hiddenName.name = `performerAdds[${performerIndex}].displayName`;
            hiddenName.value = displayName;
            inputs.appendChild(hiddenName);
        } else {
            hidden.name = `performerAdds[${performerIndex}].guestName`;
            hidden.value = displayName;
        }
        inputs.appendChild(hidden);

        const deleteBtn = label.querySelector('button');
        deleteBtn.addEventListener('click', function() {
            list.removeChild(label);
            inputs.removeChild(hidden);
            addedAccountIds.delete(accountId);
            if (accountId != null) {
                inputs.removeChild(hiddenName);
            }
            performerIndex--;
        });

        performerIndex++;
    }

    const existingPerformers = /*[[${liveFormDto.performers}]]*/ [];
    if (existingPerformers) {
        existingPerformers.forEach(p => {
            addPerformer(p.accountId, p.displayName);
        });
    }

    const existingVenueName = /*[[${liveFormDto.venueName}]]*/ null;
    const existingAddress = /*[[${liveFormDto.address}]]*/ null;
    const existingStation = /*[[${liveFormDto.nearestStation}]]*/ null;
    if (existingVenueName) {
        const detail = [existingAddress, existingStation].filter(Boolean).join(' / ');
        document.getElementById('selectedVenue').textContent =
            '選択中：' + existingVenueName + (detail ? ` (${detail})` : '');
    }

    document.getElementById('venueSearch').addEventListener('input', function() {
        const q = this.value;
        if (q.length < 1) {
            document.getElementById('venueDropdown').style.display = 'none';
            return;
        }

        fetch(`/api/venues/search?q=${q}`)
            .then(res => res.json())
            .then(data => {
                const dropdown = document.getElementById('venueDropdown');
                dropdown.innerHTML = '';
                dropdown.style.display = 'block';

                data.forEach(venue => {
                    const item = document.createElement('button');
                    item.type = 'button';
                    item.className = 'list-group-item list-group-item-action';
                    const parts = [venue.prefecture, venue.nearestStation].filter(Boolean).join(' / ');
                    item.textContent = venue.name + (parts ? ` (${parts})` : '');
                    dropdown.appendChild(item);

                    item.addEventListener('click', function() {
                        document.getElementById('venueId').value = venue.venueId;
                        const detail = [venue.address, venue.nearestStation].filter(Boolean).join(' / ');
                        document.getElementById('selectedVenue').textContent =
                            '選択中：' + venue.name + (detail ? ` (${detail})` : '');
                        document.getElementById('venueSearch').value = '';
                        dropdown.style.display = 'none';
                    });
                });
            });
    });
</script>

</body>
</html>
