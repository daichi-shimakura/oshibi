<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/common :: head}"></th:block>
  <title>芸人別ライブページ - oshibi</title>
  <style>
    .status-badge-confirmed {
      background: #198754;
      color: #fff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
    }
    .status-badge-tentative {
      background: #ffc107;
      color: #212529;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
    }
    .info-label {
      font-weight: 600;
      color: #495057;
      min-width: 140px;
    }
    .info-row {
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .info-row:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>

<nav th:replace="~{fragments/common :: header}"></nav>

<div class="container my-4">

  <!-- パンくずリスト -->
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb small">
      <li class="breadcrumb-item"><a th:href="@{/comedians}">芸人一覧</a></li>
      <li class="breadcrumb-item">
        <a th:href="@{/comedians/detail/{accountId}(accountId=${comedianLiveDetail.accountId})}"
           th:text="${comedianLiveDetail.displayName}"></a>
      </li>
      <li class="breadcrumb-item active" th:text="${comedianLiveDetail.liveTitle}"></li>
    </ol>
  </nav>

  <!-- 芸人ヘッダー -->
  <div class="detail-section">
    <div class="d-flex align-items-center gap-3">
      <h4 class="mb-0" th:text="${comedianLiveDetail.displayName}"></h4>
      <span th:text="${comedianLiveDetail.status}"
            th:class="${comedianLiveDetail.status == '出演確定'} ? 'status-badge-confirmed' : 'status-badge-tentative'"></span>
    </div>
  </div>

  <!-- 芸人からのコメント -->
  <div class="detail-section" th:if="${comedianLiveDetail.preComment != null and !#strings.isEmpty(comedianLiveDetail.preComment)}">
    <h5>芸人からのコメント</h5>
    <p class="mb-0" th:text="${comedianLiveDetail.preComment}"></p>
  </div>

  <!-- ネタ情報 -->
  <div class="detail-section" th:if="${comedianLiveDetail.netaCount != null or comedianLiveDetail.netaType != null}">
    <h5>ネタ情報</h5>
    <p th:if="${comedianLiveDetail.netaCount != null}" class="mb-1">
      <span class="text-muted small">本数：</span><span th:text="${comedianLiveDetail.netaCount}"></span>本
    </p>
    <p th:if="${comedianLiveDetail.netaType != null}" class="mb-0">
      <span class="text-muted small">種類：</span><span th:text="${comedianLiveDetail.netaType}"></span>
    </p>
  </div>

  <!-- 共通ライブ情報 -->
  <div class="detail-section">
    <h5 class="mb-3">ライブ情報</h5>
    <div class="d-flex align-items-center mb-2">
      <span th:text="${comedianLiveDetail.liveTitle}" class="fw-bold me-2"></span>
      <span th:text="${comedianLiveDetail.liveType}"
            th:class="|badge-live-type fs-6 ${comedianLiveDetail.badgeClass}|"></span>
    </div>
    <p th:if="${comedianLiveDetail.description != null and !#strings.isEmpty(comedianLiveDetail.description)}"
       th:text="${comedianLiveDetail.description}" class="text-muted small"></p>

    <div class="info-row d-flex">
      <span class="info-label">開催日</span>
      <span th:text="${#temporals.format(comedianLiveDetail.liveDate, 'yyyy/M/d（E）')}"></span>
    </div>
    <div class="info-row d-flex">
      <span class="info-label">開場 / 開演</span>
      <span>
        <span th:if="${comedianLiveDetail.openTime != null}" th:text="${comedianLiveDetail.openTime}"></span>
        <span th:if="${comedianLiveDetail.openTime != null}"> / </span>
        <span th:text="${comedianLiveDetail.startTime}"></span>
      </span>
    </div>
    <div class="info-row d-flex" th:if="${comedianLiveDetail.priceAdvance != null or comedianLiveDetail.priceDoor != null}">
      <span class="info-label">チケット料金</span>
      <span>
        <span th:if="${comedianLiveDetail.priceAdvance != null}">前売 <span th:text="${comedianLiveDetail.priceAdvance}"></span>円</span>
        <span th:if="${comedianLiveDetail.priceAdvance != null and comedianLiveDetail.priceDoor != null}"> / </span>
        <span th:if="${comedianLiveDetail.priceDoor != null}">当日 <span th:text="${comedianLiveDetail.priceDoor}"></span>円</span>
      </span>
    </div>
    <div class="info-row d-flex" th:if="${comedianLiveDetail.ticketMethod != null}">
      <span class="info-label">チケット取得方法</span>
      <span th:text="${comedianLiveDetail.ticketMethod}"></span>
    </div>
    <div class="info-row d-flex">
      <span class="info-label">会場</span>
      <span th:text="${comedianLiveDetail.venue}"></span>
    </div>
    <div class="info-row d-flex" th:if="${comedianLiveDetail.address != null}">
      <span class="info-label">住所</span>
      <span th:text="${comedianLiveDetail.address}"></span>
    </div>
    <div class="info-row d-flex" th:if="${comedianLiveDetail.nearestStation != null}">
      <span class="info-label">最寄り駅</span>
      <span th:text="${comedianLiveDetail.nearestStation}"></span>
    </div>
    <div class="info-row d-flex" th:if="${comedianLiveDetail.googleMapsUrl != null}">
      <span class="info-label">地図</span>
      <a th:href="${comedianLiveDetail.googleMapsUrl}" target="_blank">Google Mapsで見る</a>
    </div>

    <!-- 配信情報 -->
    <div th:if="${comedianLiveDetail.hasStreaming}">
      <div class="info-row d-flex">
        <span class="info-label">配信</span>
        <span>あり</span>
      </div>
      <div class="info-row d-flex" th:if="${comedianLiveDetail.streamingPrice != null}">
        <span class="info-label">配信料金</span>
        <span><span th:text="${comedianLiveDetail.streamingPrice}"></span>円</span>
      </div>
      <div class="info-row d-flex">
        <span class="info-label">配信期間</span>
        <span>
          <span th:text="${#temporals.format(comedianLiveDetail.streamingStartDate, 'yyyy/M/d')}"></span> ～
          <span th:text="${#temporals.format(comedianLiveDetail.streamingEndDate, 'yyyy/M/d')}"></span>
        </span>
      </div>
    </div>

    <div class="mt-3">
      <span class="small text-muted">登録者：</span>
      <a th:href="@{/comedians/detail/{accountId}(accountId=${comedianLiveDetail.createdByAccountId})}"
         th:text="${comedianLiveDetail.createdByName}"
         class="text-decoration-none"></a>
    </div>
  </div>

  <!-- 他の出演者 -->
  <div class="detail-section" th:if="${!#lists.isEmpty(comedianLiveDetail.performers)}">
    <h5 class="mb-3">他の出演者</h5>
    <div class="d-flex flex-wrap gap-2">
      <th:block th:each="performer : ${comedianLiveDetail.performers}">
        <a th:if="${performer.accountId != null}"
           th:href="@{/lives/{liveId}/comedians/{accountId}(liveId=${comedianLiveDetail.liveId}, accountId=${performer.accountId})}"
           th:text="${performer.displayName}"
           class="btn btn-outline-secondary btn-sm"></a>
        <span th:if="${performer.accountId == null}"
              th:text="${performer.displayName}"
              class="btn btn-outline-secondary btn-sm disabled"></span>
      </th:block>
    </div>
  </div>

</div>

<footer th:replace="~{fragments/common :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
