<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ライブ一覧・検索</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .filter-section {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 1rem;
        }
        .live-row {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 12px 16px;
            transition: box-shadow 0.15s;
        }
        .live-row:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .live-row a { text-decoration: none; color: inherit; }
        .live-title { font-weight: bold; color: #212529; }
        .performers-text { color: #6c757d; font-size: 0.85rem; }
    </style>
</head>
<body>

<!-- ========== ヘッダーナビ ========== -->
<nav th:replace="~{fragments/header :: header}"></nav>

<div class="container my-4">

        <form th:action="@{/lives}" method="get" th:object="${liveSearchDto}">

            <!-- キーワード検索 -->
            <div class="row mb-3">
                <div class="col-12">
                    <div class="input-group">
                        <input type="text" class="form-control"
                               th:field="*{keyword}"
                               placeholder="キーワード検索（ライブ名・出演者名）">
                        <button class="btn btn-dark" type="submit">検索</button>
                    </div>
                </div>
            </div>

            <!-- 日付 -->
            <div class="row g-2 mb-2">
                <div class="col-md-3">
                    <label class="form-label small text-muted">開催日（から）</label>
                    <input type="date" class="form-control form-control-sm"
                           th:value="${liveSearchDto.dateFrom != null ? #temporals.format(liveSearchDto.dateFrom, 'yyyy-MM-dd') : ''}"
                           name="dateFrom">
                </div>
                <div class="col-md-3">
                    <label class="form-label small text-muted">開催日（まで）</label>
                    <input type="date" class="form-control form-control-sm"
                           th:value="${liveSearchDto.dateTo != null ? #temporals.format(liveSearchDto.dateTo, 'yyyy-MM-dd') : ''}"
                           name="dateTo">
                </div>
            </div>

            <!-- 都道府県・ライブ種別・時間帯・価格 -->
            <div class="row g-2 mb-2">
                <div class="col-md-3">
                    <label class="form-label small text-muted">都道府県</label>
                    <select class="form-select form-select-sm" th:field="*{prefecture}">
                        <option value="">すべて</option>
                        <option value="東京都">東京都</option>
                        <option value="大阪府">大阪府</option>
                        <option value="神奈川県">神奈川県</option>
                        <option value="愛知県">愛知県</option>
                        <option value="福岡県">福岡県</option>
                        <option value="北海道">北海道</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small text-muted">ライブ種別</label>
                    <select class="form-select form-select-sm" th:field="*{liveType}">
                        <option value="">すべて</option>
                        <option value="NETA">ネタ</option>
                        <option value="TALK">トーク</option>
                        <option value="KIKAKU">企画</option>
                        <option value="AWARDS">賞レース予選</option>
                        <option value="BATTLE">バトルライブ</option>
                        <option value="SOLO">単独</option>
                        <option value="TWO_MAN">ツーマン</option>
                        <option value="UNIT">ユニットライブ</option>
                        <option value="OTHER">その他</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small text-muted">開演時間帯</label>
                    <select class="form-select form-select-sm" th:field="*{startTimeSlot}">
                        <option value="">すべて</option>
                        <option value="~17:00">～17:00</option>
                        <option value="17:00~18:00">17:00～18:00</option>
                        <option value="18:00~19:00">18:00～19:00</option>
                        <option value="19:00~20:00">19:00～20:00</option>
                        <option value="20:00~">20:00～</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small text-muted">価格上限（円）</label>
                    <input type="number" class="form-control form-control-sm"
                           th:field="*{maxPrice}"
                           placeholder="例：3000">
                </div>
            </div>

            <!-- 過去のライブを含む -->
            <div class="row g-2 mt-1">
                <div class="col-md-3 d-flex align-items-center">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox"
                               th:field="*{hasPast}">
                        <label class="form-check-label small">過去のライブを含む</label>
                    </div>
                </div>
            </div>
        </form>
    <!-- ========== 検索結果ヘッダー ========== -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <p class="text-muted mb-0">検索結果：<strong th:text="${#lists.size(lives)}">0</strong>件</p>
    </div>

    <!-- ========== ライブ一覧（リスト形式） ========== -->
    <div class="d-flex flex-column gap-2">

        <div class="live-row" th:each="live : ${lives}">
            <a th:href="@{/lives/{liveId}(liveId=${live.liveId})}" class="d-block">
                <div class="d-flex justify-content-between align-items-start">
                    <div class="flex-grow-1">
                        <span th:text="${live.liveTitle}" class="live-title"></span>
                        <span th:text="${live.liveType}" class="badge bg-secondary ms-2"></span>
                    </div>
                    <div class="text-end text-nowrap ms-3">
                        <span class="small">前売
                            <span th:text="${live.priceAdvance}" class="small"></span>円
                            <span class="small">/当日 </span>
                            <span th:text="${live.priceDoor}" class="small"></span>円
                        </span>
                    </div>
                </div>
                <div class="mt-1">
                    <span th:text="${#temporals.format(live.liveDate, 'yyyy/M/d')}" class="small text-muted"></span>
                    /開場
                    <span th:text="${live.openTime}" class="small text-muted"></span>
                    /開演
                    <span th:text="${live.startTime}" class="small text-muted"></span>
                    <span th:text="${live.venue + '（' + live.prefecture + '）'}" class="small text-muted ms-3">新宿バティオス（東京都）</span>
                </div>
                <div class="performers-text mt-1">
                    出演：<span th:text="${#strings.listJoin(live.comedianNames, '、')}"></span>
                </div>
                <div class="performers-text mt-1">
                    他
                    <span th:text="${live.otherPerformerCount}" class="performers-text mt-1">5</span>
                    組
                </div>
            </a>
        </div>
    </div>

    <!-- ========== ページネーション ========== -->
    <nav class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item disabled"><a class="page-link" href="#">前へ</a></li>
            <li class="page-item active"><a class="page-link" href="#">1</a></li>
            <li class="page-item"><a class="page-link" href="#">2</a></li>
            <li class="page-item"><a class="page-link" href="#">3</a></li>
            <li class="page-item"><a class="page-link" href="#">...</a></li>
            <li class="page-item"><a class="page-link" href="#">13</a></li>
            <li class="page-item"><a class="page-link" href="#">次へ</a></li>
        </ul>
    </nav>

</div>

<!-- ========== フッター ========== -->
<footer class="bg-dark text-white text-center py-3 mt-5">
    <small>&copy; 2026 おしび（仮）</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
