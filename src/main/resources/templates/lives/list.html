<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <th:block th:replace="~{fragments/common :: head}"></th:block>
    <title>ライブ一覧 - oshibi</title>
</head>
<body>

<!-- ========== ヘッダーナビ ========== -->
<nav th:replace="~{fragments/common :: header}"></nav>

<div class="container my-4">

    <div class="filter-section mb-4">
        <form th:action="@{/lives}" method="get" th:object="${liveSearchDto}">

            <!-- キーワード検索 -->
            <div class="row mb-3">
                <div class="col-12">
                    <div class="input-group">
                        <input type="text" class="form-control"
                               th:field="*{keyword}"
                               placeholder="キーワード検索（ライブ名・出演者名）">
                        <button class="btn btn-primary" type="submit">検索</button>
                    </div>
                </div>
            </div>

            <!-- 日付 -->
            <div class="row g-2 mb-2">
                <div class="col-md-3">
                    <label class="form-label small text-muted">開催日（から）</label>
                    <input type="date" class="form-control form-control-sm"
                           th:value="${liveSearchDto.dateFrom != null ? #temporals.format(liveSearchDto.dateFrom, 'yyyy-MM-dd') : ''}"
                           name="dateFrom">
                </div>
                <div class="col-md-3">
                    <label class="form-label small text-muted">開催日（まで）</label>
                    <input type="date" class="form-control form-control-sm"
                           th:value="${liveSearchDto.dateTo != null ? #temporals.format(liveSearchDto.dateTo, 'yyyy-MM-dd') : ''}"
                           name="dateTo">
                </div>
            </div>

            <!-- 都道府県・ライブ種別・時間帯・価格 -->
            <div class="row g-2 mb-2">
                <div class="col-md-3">
                    <label class="form-label small text-muted">都道府県</label>
                    <select class="form-select form-select-sm" th:field="*{prefecture}">
                        <option value="">すべて</option>
                        <option value="東京都">東京都</option>
                        <option value="大阪府">大阪府</option>
                        <option value="神奈川県">神奈川県</option>
                        <option value="愛知県">愛知県</option>
                        <option value="福岡県">福岡県</option>
                        <option value="北海道">北海道</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small text-muted">ライブ種別</label>
                    <select class="form-select form-select-sm" th:field="*{liveType}">
                        <option value="">すべて</option>
                        <option value="NETA">ネタ</option>
                        <option value="TALK">トーク</option>
                        <option value="KIKAKU">企画</option>
                        <option value="YOSEN">賞レース予選</option>
                        <option value="BATTLE">バトルライブ</option>
                        <option value="TANDOKU">単独</option>
                        <option value="TWOMAN">ツーマン</option>
                        <option value="UNIT">ユニットライブ</option>
                        <option value="OTHER">その他</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small text-muted">開演時間帯</label>
                    <select class="form-select form-select-sm" th:field="*{startTimeSlot}">
                        <option value="">すべて</option>
                        <option value="~17:00">～17:00</option>
                        <option value="17:00~18:00">17:00～18:00</option>
                        <option value="18:00~19:00">18:00～19:00</option>
                        <option value="19:00~20:00">19:00～20:00</option>
                        <option value="20:00~">20:00～</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small text-muted">価格上限（円）</label>
                    <input type="number" class="form-control form-control-sm"
                           th:field="*{maxPrice}"
                           placeholder="例：3000">
                </div>
            </div>

            <!-- 過去のライブを含む -->
            <div class="row g-2 mt-1">
                <div class="col-md-3 d-flex align-items-center">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox"
                               th:field="*{hasPast}">
                        <label class="form-check-label small">過去のライブを含む</label>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <!-- ========== 検索結果ヘッダー ========== -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <p class="text-muted mb-0">検索結果：<strong th:text="${livePage.totalElements}">0</strong>件</p>
    </div>

    <!-- ========== ライブ一覧（リスト形式） ========== -->
    <div class="d-flex flex-column gap-2">

        <div class="live-row" th:each="live : ${livePage.content}">
            <a th:href="@{/lives/{liveId}(liveId=${live.liveId})}" class="d-block">
                <div class="d-flex justify-content-between align-items-start">
                    <div class="flex-grow-1">
                        <span th:text="${live.liveTitle}" class="live-title"></span>
                        <span th:text="${live.liveType}"
                              th:class="|badge-live-type ms-2 ${live.badgeClass}|"></span>
                    </div>
                    <div class="text-end text-nowrap ms-3 small">
                        <span th:if="${live.priceAdvance != null}">前売 <span th:text="${live.priceAdvance}"></span>円 / </span>
                        <span th:if="${live.priceDoor != null}">当日 <span th:text="${live.priceDoor}"></span>円</span>
                        <span th:if="${live.priceAdvance == null and live.priceDoor == null}">料金未定</span>
                    </div>
                </div>
                <div class="mt-1">
                    <span th:text="${#temporals.format(live.liveDate, 'yyyy/M/d')}" class="small text-muted"></span>
                    <span th:if="${live.openTime != null}" class="small text-muted"> /開場 <span th:text="${live.openTime}"></span></span>
                    <span class="small text-muted"> /開演 <span th:text="${live.startTime}"></span></span>
                    <span th:text="${live.venue != null ? live.venue + '（' + live.prefecture + '）' : '会場未定'}" class="small text-muted ms-3"></span>
                </div>
                <div class="performers-text mt-1">
                    出演：<span th:text="${#strings.listJoin(live.comedianNames, '、')}"></span>
                </div>
                <div class="performers-text mt-1" th:if="${live.otherPerformerCount > 0}">
                    他 <span th:text="${live.otherPerformerCount}"></span>組
                </div>
            </a>
        </div>
    </div>

    <!-- ========== ページネーション ========== -->
    <nav class="mt-4">
        <ul class="pagination justify-content-center">

            <!-- 前へ -->
            <li class="page-item" th:classappend="${!livePage.hasPrevious()} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/lives(page=${livePage.number - 1},
                                    keyword=${liveSearchDto.keyword},
                                    dateFrom=${liveSearchDto.dateFrom},
                                    dateTo=${liveSearchDto.dateTo},
                                    hasPast=${liveSearchDto.hasPast},
                                    prefecture=${liveSearchDto.prefecture},
                                    liveType=${liveSearchDto.liveType},
                                    maxPrice=${liveSearchDto.maxPrice},
                                    startTimeSlot=${liveSearchDto.startTimeSlot})}">前へ</a>
            </li>

            <!-- ページ番号 -->
            <!-- ページ番号 li全体をth:ifで囲む -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, livePage.totalPages - 1)}"
                th:if="${livePage.totalPages > 0}"
                th:classappend="${i == livePage.number} ? 'active'">
                <a class="page-link"
                   th:href="@{/lives(page=${i},
                   keyword=${liveSearchDto.keyword},
                                    dateFrom=${liveSearchDto.dateFrom},
                                    dateTo=${liveSearchDto.dateTo},
                                    hasPast=${liveSearchDto.hasPast},
                                    prefecture=${liveSearchDto.prefecture},
                                    liveType=${liveSearchDto.liveType},
                                    maxPrice=${liveSearchDto.maxPrice},
                                    startTimeSlot=${liveSearchDto.startTimeSlot})}"
                   th:text="${i + 1}"></a>
            </li>

            <!-- 次へ -->
            <li class="page-item" th:classappend="${!livePage.hasNext()} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/lives(page=${livePage.number + 1},keyword=${liveSearchDto.keyword},
                                    dateFrom=${liveSearchDto.dateFrom},
                                    dateTo=${liveSearchDto.dateTo},
                                    hasPast=${liveSearchDto.hasPast},
                                    prefecture=${liveSearchDto.prefecture},
                                    liveType=${liveSearchDto.liveType},
                                    maxPrice=${liveSearchDto.maxPrice},
                                    startTimeSlot=${liveSearchDto.startTimeSlot})}">次へ</a>
            </li>

        </ul>
    </nav>

</div>

<footer th:replace="~{fragments/common :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
