<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${comedianLiveForm.liveTitle} + ' - 芸人別ライブ情報編集'">芸人別ライブ情報編集</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f5f5f5; }
    .detail-section {
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .info-label {
      font-weight: 600;
      color: #495057;
      min-width: 140px;
    }
    .info-row {
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .info-row:last-child { border-bottom: none; }
    .comedian-comment {
      background: #f8f9fa;
      border-left: 4px solid #0d6efd;
      padding: 12px 16px;
      border-radius: 0 6px 6px 0;
    }
    .neta-info {
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      padding: 12px 16px;
    }
  </style>
</head>
<body>

<!-- ヘッダー -->
<nav th:replace="~{fragments/header :: header}"></nav>

<div class="container my-4" style="max-width: 800px;">

  <!-- パンくず -->
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb small">
      <li class="breadcrumb-item">
        <a th:href="@{/my-lives}">マイライブ</a>
      </li>
      <li class="breadcrumb-item">
        <a th:href="@{/lives/{liveId}/comedians/{accountId}(liveId=${comedianLiveForm.liveId}, accountId=${comedianLiveForm.accountId})}"
           th:text="${comedianLiveForm.liveTitle}">ライブ名</a>
      </li>
      <li class="breadcrumb-item active">編集</li>
    </ol>
  </nav>

  <h4 class="mb-4">芸人別ライブ情報の編集</h4>

  <!-- ========== 編集フォーム（上） ========== -->
  <div class="detail-section">
    <h5 class="mb-3">自分のライブ情報を編集</h5>

    <form th:action="@{/lives/{liveId}/comedians/{accountId}/edit(liveId=${comedianLiveForm.liveId}, accountId=${comedianLiveForm.accountId})}"
          th:object="${form}"
          method="post">

      <!-- ステータス -->
      <div class="mb-3">
        <label class="form-label">ステータス</label>
        <div class="d-flex gap-3">
          <div class="form-check">
            <input class="form-check-input" type="radio"
                   th:field="*{status}" th:value="CONFIRMED" id="statusConfirmed">
            <label class="form-check-label" for="statusConfirmed">本予定</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio"
                   th:field="*{status}" th:value="TENTATIVE" id="statusTentative">
            <label class="form-check-label" for="statusTentative">仮予定</label>
          </div>
        </div>
      </div>

      <!-- ネタ本数・種類 -->
      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <label class="form-label">ネタ本数</label>
          <input type="number" class="form-control" th:field="*{netaCount}"
                 placeholder="例：3" min="0">
        </div>
        <div class="col-md-8">
          <label class="form-label">ネタ種類</label>
          <input type="text" class="form-control" th:field="*{netaType}"
                 placeholder="例：コント2本、漫才1本">
        </div>
      </div>

      <!-- ファンへのコメント -->
      <div class="mb-4">
        <label class="form-label">ファンへのコメント</label>
        <textarea class="form-control" th:field="*{preComment}" rows="5"
                  placeholder="意気込み、見どころ、置きチケの案内など"></textarea>
      </div>

      <!-- ボタン -->
      <div class="d-flex justify-content-end gap-2">
        <a th:href="@{/lives/{liveId}/comedians/{accountId}(liveId=${comedianLiveForm.liveId}, accountId=${comedianLiveForm.accountId})}"
           class="btn btn-outline-secondary">キャンセル</a>
        <button type="submit" class="btn btn-dark">保存する</button>
      </div>

    </form>
  </div>

  <!-- ========== ライブ情報（下・参照表示） ========== -->
  <div class="detail-section">
    <h5 class="mb-3">ライブ情報</h5>
    <div class="info-row d-flex">
      <span class="info-label">ライブ名</span>
      <span>
        <a th:href="@{/lives/{liveId}(liveId=${comedianLiveForm.liveId})}"
           th:text="${comedianLiveForm.liveTitle}">ライブ名</a>
      </span>
    </div>
    <div class="info-row d-flex">
      <span class="info-label">ライブ種別</span>
      <span th:text="${comedianLiveForm.liveType}">ネタ</span>
    </div>
    <div class="info-row d-flex">
      <span class="info-label">説明</span>
      <span th:text="${comedianLiveForm.description}"></span>
    </div>
    <div class="info-row d-flex">
      <span class="info-label">開催日</span>
      <span th:text="${#temporals.format(comedianLiveForm.liveDate, 'yyyy年M月d日')}">2026年3月15日</span>
    </div>
    <div class="info-row d-flex">
      <span class="info-label">開場 / 開演</span>
      <span>
        <span th:text="${comedianLiveForm.openTime}">17:30</span>
        /
        <span th:text="${comedianLiveForm.startTime}">18:00</span>
      </span>
    </div>
    <div class="info-row d-flex">
      <span class="info-label">チケット料金</span>
      <span>
        前売 <span th:text="${comedianLiveForm.priceAdvance}"></span>円
        / 当日 <span th:text="${comedianLiveForm.priceDoor}"></span>円
      </span>
    </div>
    <div class="info-row d-flex">
      <span class="info-label">チケット取得方法</span>
      <span th:text="${comedianLiveForm.ticketMethod}"></span>
    </div>
    <div class="info-row d-flex" th:if="${comedianLiveForm.hasStreaming}">
      <span class="info-label">配信</span>
      <span>
        <span th:text="${comedianLiveForm.streamingPrice}"></span>円 /
        <span th:text="${comedianLiveForm.streamingStartDate}"></span>〜<span th:text="${comedianLiveForm.streamingEndDate}"></span>
      </span>
    </div>
    <div class="info-row d-flex">
      <span class="info-label">会場</span>
      <span th:text="${comedianLiveForm.venue} + '（' + ${comedianLiveForm.prefecture} + '）'"></span>
    </div>
    <div class="info-row d-flex">
      <span class="info-label">住所</span>
      <span th:text="${comedianLiveForm.address}"></span>
    </div>
    <div class="info-row d-flex">
      <span class="info-label">最寄り駅</span>
      <span th:text="${comedianLiveForm.nearestStation}"></span>
    </div>
    <div class="info-row d-flex" th:if="${comedianLiveForm.googleMapsUrl != null}">
      <span class="info-label">Google Maps</span>
      <a th:href="${comedianLiveForm.googleMapsUrl}" target="_blank">地図を見る</a>
    </div>

    <!-- 他の出演者 -->
    <div class="mt-3" th:if="${not #lists.isEmpty(comedianLiveForm.performers)}">
      <span class="info-label d-block mb-2">他の出演者</span>
      <div class="d-flex flex-wrap gap-2">
        <a th:each="performer : ${comedianLiveForm.performers}"
           th:href="@{/lives/{liveId}/comedians/{accountId}(liveId=${comedianLiveForm.liveId}, accountId=${performer.accountId})}"
           th:text="${performer.displayName}"
           class="btn btn-outline-secondary btn-sm">芸人B</a>
      </div>
    </div>
  </div>

</div>

<footer class="bg-dark text-white text-center py-3 mt-5">
  <small>&copy; 2026 oshibi</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
