<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ライブ詳細</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .detail-section {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .performer-link {
            text-decoration: none;
            color: #0d6efd;
        }
        .performer-link:hover {
            text-decoration: underline;
        }
        .info-label {
            font-weight: 600;
            color: #495057;
            min-width: 140px;
        }
        .info-row {
            padding: 6px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .registrant-box {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 10px 16px;
        }
        .performer-inline {
            line-height: 1.8;
        }
        .performer-inline a {
            display: inline;
        }
    </style>
</head>
<body>

<nav th:replace="~{fragments/header :: header}"></nav>

<div class="container my-4">

    <!-- パンくずリスト -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb small">
            <li class="breadcrumb-item"><a th:href="@{/lives}">ライブ一覧</a></li>
            <li class="breadcrumb-item active" th:text="${live.liveTitle}"></li>
        </ol>
    </nav>

    <!-- ライブタイトル -->
    <div class="detail-section">
        <div class="d-flex justify-content-between align-items-start mb-3">
            <h4 th:text="${live.liveTitle}" class="mb-0"></h4>
            <span th:text="${live.liveType}" class="badge bg-secondary fs-6"></span>
        </div>
        <p th:text="${live.description}" class="mb-0"></p>
    </div>

    <!-- 日時・料金・チケット情報 -->
    <div class="detail-section">
        <h5 class="mb-3">公演情報</h5>
        <div class="info-row d-flex">
            <span class="info-label">開催日</span>
            <span th:text="${live.liveDate}"></span>
        </div>
        <div class="info-row d-flex">
            <span class="info-label">開場 / 開演</span>
            <span th:text="${live.openTime}"></span> / <span th:text="${live.startTime}"></span>
        </div>
        <div class="info-row d-flex">
            <span class="info-label">チケット料金</span>
            <span>
                前売 <span th:text="${live.priceAdvance}"></span>円 /
                当日 <span th:text="${live.priceDoor}"></span>円
            </span>
        </div>
        <div class="info-row d-flex">
            <span class="info-label">チケット取得方法</span>
            <span th:text="${live.ticketMethod}"></span>
        </div>
        <div class="info-row d-flex">
            <span class="info-label">配信</span>
            <span th:text="${live.hasStreaming} ? 'あり' : 'なし'"></span>
        </div>
        <div class="info-row d-flex" th:if="${live.hasStreaming}">
            <span class="info-label">配信料金</span>
            <span><span th:text="${live.streamingPrice}"></span>円</span>
        </div>
        <div class="info-row d-flex" th:if="${live.hasStreaming}">
            <span class="info-label">配信期間</span>
            <span>
                <span th:text="${live.streamingStartDate}"></span> ～
                <span th:text="${live.streamingEndDate}"></span>
            </span>
        </div>
    </div>

    <!-- 出演者一覧 -->
    <div class="detail-section">
        <h5 class="mb-3">出演者（出番順）</h5>
        <div class="performer-inline">
            <span th:each="performer, iter : ${live.performers}">
                <a th:href="@{/comedians/detail/{accountId}(accountId=${performer.accountId})}"
                   th:text="${performer.displayName}"
                   class="performer-link"></a><span th:if="!${iter.last}">、</span>
            </span>
        </div>
    </div>

    <!-- 会場・アクセス -->
    <div class="detail-section">
        <h5 class="mb-3">会場・アクセス</h5>
        <div class="info-row d-flex">
            <span class="info-label">会場</span>
            <span th:text="${live.venue}"></span>
        </div>
        <div class="info-row d-flex">
            <span class="info-label">住所</span>
            <span th:text="${live.address}"></span>
        </div>
        <div class="info-row d-flex">
            <span class="info-label">最寄り駅</span>
            <span th:text="${live.nearestStation}"></span>
        </div>
        <div class="info-row d-flex" th:if="${live.googleMapsUrl != null}">
            <span class="info-label">地図</span>
            <a th:href="${live.googleMapsUrl}" target="_blank">Google Mapsで見る</a>
        </div>
    </div>

    <!-- 登録者情報 -->
    <div class="registrant-box mb-4">
        <span class="small text-muted">この情報の登録者：</span>
        <a th:href="@{/comedians/detail/{accountId}(accountId=${live.createdByAccountId})}"
           th:text="${live.createdByName}"
           class="fw-bold text-decoration-none"></a>
    </div>

</div>

<footer class="bg-dark text-white text-center py-3 mt-5">
    <small>&copy; 2026 oshibi</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
