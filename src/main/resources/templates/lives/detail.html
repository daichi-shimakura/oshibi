<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/common :: head}"></th:block>
    <title>ライブ詳細 - oshibi</title>
    <style>
        .performer-link {
            text-decoration: none;
            color: #0d6efd;
        }
        .performer-link:hover {
            text-decoration: underline;
        }
        .registrant-box {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 10px 16px;
        }
        .performer-inline {
            line-height: 1.8;
        }
        .performer-inline a {
            display: inline;
        }
    </style>
</head>
<body>

<nav th:replace="~{fragments/common :: header}"></nav>

<div class="container my-4">

    <!-- パンくずリスト -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb small">
            <li class="breadcrumb-item"><a th:href="@{/lives}">ライブ一覧</a></li>
            <li class="breadcrumb-item active" th:text="${live.liveTitle}"></li>
        </ol>
    </nav>

    <!-- ライブタイトル -->
    <div class="detail-section">
        <div class="d-flex justify-content-between align-items-start mb-3">
            <h4 th:text="${live.liveTitle}" class="mb-0"></h4>
            <span th:text="${live.liveType}"
                  th:class="|badge-live-type fs-6 ${live.badgeClass}|"></span>
        </div>
        <p th:if="${live.description != null and !#strings.isEmpty(live.description)}"
           th:text="${live.description}" class="mb-0"></p>
    </div>

    <!-- 日時・料金・チケット情報 -->
    <div class="detail-section">
        <h5 class="mb-3">公演情報</h5>
        <div class="info-row d-flex">
            <span class="info-label">開催日</span>
            <span th:text="${#temporals.format(live.liveDate, 'yyyy/M/d（E）')}"></span>
        </div>
        <div class="info-row d-flex">
            <span class="info-label">開場 / 開演</span>
            <span>
                <span th:if="${live.openTime != null}" th:text="${live.openTime}"></span>
                <span th:if="${live.openTime != null}"> / </span>
                <span th:text="${live.startTime}"></span>
            </span>
        </div>
        <div class="info-row d-flex" th:if="${live.priceAdvance != null or live.priceDoor != null}">
            <span class="info-label">チケット料金</span>
            <span>
                <span th:if="${live.priceAdvance != null}">前売 <span th:text="${live.priceAdvance}"></span>円</span>
                <span th:if="${live.priceAdvance != null and live.priceDoor != null}"> / </span>
                <span th:if="${live.priceDoor != null}">当日 <span th:text="${live.priceDoor}"></span>円</span>
            </span>
        </div>
        <div class="info-row d-flex" th:if="${live.ticketMethod != null}">
            <span class="info-label">チケット取得方法</span>
            <span th:text="${live.ticketMethod}"></span>
        </div>
        <div class="info-row d-flex">
            <span class="info-label">配信</span>
            <span th:text="${live.hasStreaming} ? 'あり' : 'なし'"></span>
        </div>
        <div class="info-row d-flex" th:if="${live.hasStreaming and live.streamingPrice != null}">
            <span class="info-label">配信料金</span>
            <span><span th:text="${live.streamingPrice}"></span>円</span>
        </div>
        <div class="info-row d-flex" th:if="${live.hasStreaming}">
            <span class="info-label">配信期間</span>
            <span>
                <span th:text="${live.streamingStartDate}"></span> ～
                <span th:text="${live.streamingEndDate}"></span>
            </span>
        </div>
    </div>

    <!-- 出演者一覧 -->
    <div class="detail-section">
        <h5 class="mb-3">出演者（出番順）</h5>
        <div class="performer-inline">
            <span th:each="performer, iter : ${live.performers}">
                <a th:if="${performer.accountId != null}"
                   th:href="@{/comedians/detail/{accountId}(accountId=${performer.accountId})}"
                   th:text="${performer.displayName}"
                   class="performer-link"></a>
                <span th:if="${performer.accountId == null}"
                      th:text="${performer.displayName}"></span>
                <span th:if="!${iter.last}">、</span>
            </span>
        </div>
    </div>

    <!-- 芸人別ライブ情報一覧 -->
    <div class="detail-section">
        <h5 class="mb-3">各芸人のライブ情報</h5>
        <div class="d-flex flex-wrap gap-2">
            <th:block th:each="performer : ${live.performers}">
                <a th:if="${performer.accountId != null and performer.status == 'CONFIRMED'}"
                   th:href="@{/lives/{liveId}/comedians/{accountId}(liveId=${live.liveId}, accountId=${performer.accountId})}"
                   th:text="${performer.displayName}"
                   class="btn btn-outline-secondary btn-sm"></a>
            </th:block>
        </div>
    </div>

    <!-- 会場・アクセス -->
    <div class="detail-section">
        <h5 class="mb-3">会場・アクセス</h5>
        <div class="info-row d-flex">
            <span class="info-label">会場</span>
            <span th:text="${live.venue}"></span>
        </div>
        <div class="info-row d-flex" th:if="${live.address != null}">
            <span class="info-label">住所</span>
            <span th:text="${live.address}"></span>
        </div>
        <div class="info-row d-flex" th:if="${live.nearestStation != null}">
            <span class="info-label">最寄り駅</span>
            <span th:text="${live.nearestStation}"></span>
        </div>
        <div class="info-row d-flex" th:if="${live.googleMapsUrl != null}">
            <span class="info-label">地図</span>
            <a th:href="${live.googleMapsUrl}" target="_blank">Google Mapsで見る</a>
        </div>
    </div>

    <!-- 登録者情報 -->
    <div class="registrant-box mb-4">
        <span class="small text-muted">この情報の登録者：</span>
        <a th:href="@{/comedians/detail/{accountId}(accountId=${live.createdByAccountId})}"
           th:text="${live.createdByName}"
           class="fw-bold text-decoration-none"></a>
    </div>

</div>

<footer th:replace="~{fragments/common :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
