<!DOCTYPE html>
<html lang="ja">
<head>
  <th:block th:replace="~{fragments/common :: head}"></th:block>
  <title>ユーザー登録 - oshibi</title>
  <style>
    .auth-card {
      max-width: 420px;
      margin: 80px auto;
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 2rem;
    }
    .auth-title {
      font-size: 1.4rem;
      font-weight: bold;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>

<!-- ヘッダー -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/lives">oshi<span>bi</span></a>
  </div>
</nav>

<div class="container">
  <div class="auth-card">
    <div class="auth-title">ユーザー登録</div>

    <form th:action="@{/register}" th:object="${registerDto}" method="post">

      <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger mb-3">
        <p th:each="error : ${#fields.globalErrors()}" th:text="${error}" class="mb-0"></p>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">メールアドレス</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="example@email.com">
        <div th:if="${#fields.hasErrors('email')}" class="text-danger small mt-1">
          <p th:each="error : ${#fields.errors('email')}" th:text="${error}" class="mb-0"></p>
        </div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">パスワード</label>
        <div class="input-group">
          <input type="password" class="form-control" id="password" name="password">
          <button class="btn btn-outline-secondary" type="button" id="togglePassword">表示</button>
        </div>
        <div th:if="${#fields.hasErrors('password')}" class="text-danger small mt-1">
          <p th:each="error : ${#fields.errors('password')}" th:text="${error}" class="mb-0"></p>
        </div>
      </div>

      <div class="mb-4">
        <label for="passwordConfirm" class="form-label">パスワード（確認）</label>
        <div class="input-group">
          <input type="password" class="form-control" id="passwordConfirm" name="passwordConfirm">
          <button class="btn btn-outline-secondary" type="button" id="togglePasswordConfirm">表示</button>
        </div>
        <div th:if="${#fields.hasErrors('passwordConfirm')}" class="text-danger small mt-1">
          <p th:each="error : ${#fields.errors('passwordConfirm')}" th:text="${error}" class="mb-0"></p>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label">アカウント種別</label>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="accountType" id="typeFan" value="FAN" checked>
          <label class="form-check-label" for="typeFan">ファン</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="accountType" id="typeLiveStaff" value="LIVE_STAFF">
          <label class="form-check-label" for="typeLiveStaff">ライブ関係者（芸人・スタッフ）</label>
        </div>
      </div>

      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-primary">登録する</button>
      </div>
    </form>

    <div class="text-center small">
      すでにアカウントをお持ちの方は
      <a href="/login">ログイン</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('togglePassword').addEventListener('click', function() {
    const input = document.getElementById('password');
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    this.textContent = isPassword ? '隠す' : '表示';
  });
  document.getElementById('togglePasswordConfirm').addEventListener('click', function() {
    const input = document.getElementById('passwordConfirm');
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    this.textContent = isPassword ? '隠す' : '表示';
  });
</script>
</body>
</html>
