<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - おしび</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
        background: #f5f5f5;
    }
    .auth-card {
        max-width: 420px;
        margin: 80px auto;
        background: #fff;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        padding: 2rem;
    }
    .auth-title {
        font-size: 1.4rem;
        font-weight: bold;
        margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>

<!-- ヘッダー -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/lives">おしび（仮）</a>
  </div>
</nav>

<div class="container">
  <div class="auth-card">
    <div class="auth-title">ログイン</div>

    <form th:action="@{/login}" method="post">

      <div class="mb-3">
        <label for="username" class="form-label">メールアドレス</label>
        <input type="email" class="form-control" id="username" name="username" placeholder="example@email.com">
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">パスワード</label>
        <input type="password" class="form-control" id="password" name="password">
      </div>

      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-dark">ログイン</button>
      </div>
    </form>

    <div class="text-center small">
      アカウントをお持ちでない方は
      <a href="/register">こちらから登録</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
