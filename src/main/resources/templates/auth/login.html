<!DOCTYPE html>
<html lang="ja">
<head>
  <th:block th:replace="~{fragments/common :: head}"></th:block>
  <title>ログイン - oshibi</title>
  <style>
    .auth-card {
      max-width: 420px;
      margin: 80px auto;
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 2rem;
    }
    .auth-title {
      font-size: 1.4rem;
      font-weight: bold;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>

<!-- ヘッダー -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/lives">oshi<span>bi</span></a>
  </div>
</nav>

<div class="container">
  <div class="auth-card">
    <div class="auth-title">ログイン</div>

    <form th:action="@{/login}" method="post">

      <div th:if="${param.error}" class="alert alert-danger mb-3">
        メールアドレスまたはパスワードが正しくありません
      </div>

      <div class="mb-3">
        <label for="username" class="form-label">メールアドレス</label>
        <input type="email" class="form-control" id="username" name="username" placeholder="example@email.com">
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">パスワード</label>
        <div class="input-group">
          <input type="password" class="form-control" id="password" name="password">
          <button class="btn btn-outline-secondary" type="button" id="togglePassword">表示</button>
        </div>
      </div>

      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-primary">ログイン</button>
      </div>
    </form>

    <div class="text-center small">
      アカウントをお持ちでない方は
      <a href="/register">こちらから登録</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('togglePassword').addEventListener('click', function() {
    const input = document.getElementById('password');
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    this.textContent = isPassword ? '隠す' : '表示';
  });
</script>
</body>
</html>
