<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アカウント設定</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- ヘッダーナビ -->
<nav th:replace="~{fragments/header :: header}"></nav>

<div class="container my-4" style="max-width: 800px;">

    <h4 class="mb-4">アカウント設定</h4>

    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <a class="nav-link active" data-bs-toggle="tab" href="#profile">プロフィール</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" data-bs-toggle="tab" href="#login">ログイン情報</a>
        </li>
    </ul>

    <div class="tab-content">

        <!-- プロフィールタブ -->
        <div class="tab-pane fade show active" id="profile">
            <form th:action="@{/account/edit}" method="post" th:object="${profileFormDto}">

                <!-- グローバルエラー -->
                <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger mb-3">
                    <p th:each="error : ${#fields.globalErrors()}" th:text="${error}" class="mb-0"></p>
                </div>

                <div class="mb-3">
                    <label class="form-label">表示名<span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{displayName}">
                    <div th:if="${#fields.hasErrors('displayName')}" class="text-danger small mt-1">
                        <p th:each="error : ${#fields.errors('displayName')}" th:text="${error}" class="mb-0"></p>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">自己紹介</label>
                    <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                    <div th:if="${#fields.hasErrors('description')}" class="text-danger small mt-1">
                        <p th:each="error : ${#fields.errors('description')}" th:text="${error}" class="mb-0"></p>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">プロフィール画像URL</label>
                    <input type="text" class="form-control" th:field="*{profileImageUrl}">
                    <div th:if="${#fields.hasErrors('profileImageUrl')}" class="text-danger small mt-1">
                        <p th:each="error : ${#fields.errors('profileImageUrl')}" th:text="${error}" class="mb-0"></p>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">アカウント種別</label>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="accountType" id="typeFan" value="FAN" disabled
                               th:checked="${profileFormDto.accountType == 'FAN'}">
                        <label class="form-check-label" for="typeFan">ファン</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="accountType" id="typeLiveStaff" value="LIVE_STAFF" disabled
                               th:checked="${profileFormDto.accountType == 'LIVE_STAFF'}">
                        <label class="form-check-label" for="typeLiveStaff">ライブ関係者（芸人・スタッフ）</label>
                    </div>
                </div>

                <!-- ライブ関係者専用 -->
                <div th:if="${profileFormDto.accountType == 'LIVE_STAFF'}">
                    <div class="mb-3">
                        <label class="form-label">活動カテゴリ</label>
                        <div class="d-flex gap-3">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" th:field="*{unitType}" value="PIN">
                                <label class="form-check-label">ピン</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" th:field="*{unitType}" value="COMBI">
                                <label class="form-check-label">コンビ</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" th:field="*{unitType}" value="TRIO">
                                <label class="form-check-label">トリオ</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" th:field="*{unitType}" value="GROUP">
                                <label class="form-check-label">グループ</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" th:field="*{unitType}" value="STAFF">
                                <label class="form-check-label">スタッフ</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" th:field="*{unitType}" value="OTHER">
                                <label class="form-check-label">その他</label>
                            </div>
                        </div>
                        <div th:if="${#fields.hasErrors('unitType')}" class="text-danger small mt-1">
                            <p th:each="error : ${#fields.errors('unitType')}" th:text="${error}" class="mb-0"></p>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">所属事務所</label>
                        <input type="text" class="form-control" th:field="*{agency}">
                        <div th:if="${#fields.hasErrors('agency')}" class="text-danger small mt-1">
                            <p th:each="error : ${#fields.errors('agency')}" th:text="${error}" class="mb-0"></p>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">メンバー名</label>
                        <input type="text" class="form-control" th:field="*{memberNames}">
                        <div th:if="${#fields.hasErrors('memberNames')}" class="text-danger small mt-1">
                            <p th:each="error : ${#fields.errors('memberNames')}" th:text="${error}" class="mb-0"></p>
                        </div>
                    </div>
                </div>

                <!-- SNSリンク -->
                <div class="mb-3">
                    <label class="form-label">X（Twitter）URL</label>
                    <input type="text" class="form-control" th:field="*{xUrl}">
                    <div th:if="${#fields.hasErrors('xUrl')}" class="text-danger small mt-1">
                        <p th:each="error : ${#fields.errors('xUrl')}" th:text="${error}" class="mb-0"></p>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Instagram URL</label>
                    <input type="text" class="form-control" th:field="*{instagramUrl}">
                    <div th:if="${#fields.hasErrors('instagramUrl')}" class="text-danger small mt-1">
                        <p th:each="error : ${#fields.errors('instagramUrl')}" th:text="${error}" class="mb-0"></p>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">YouTube URL</label>
                    <input type="text" class="form-control" th:field="*{youtubeUrl}">
                    <div th:if="${#fields.hasErrors('youtubeUrl')}" class="text-danger small mt-1">
                        <p th:each="error : ${#fields.errors('youtubeUrl')}" th:text="${error}" class="mb-0"></p>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">TikTok URL</label>
                    <input type="text" class="form-control" th:field="*{tiktokUrl}">
                    <div th:if="${#fields.hasErrors('tiktokUrl')}" class="text-danger small mt-1">
                        <p th:each="error : ${#fields.errors('tiktokUrl')}" th:text="${error}" class="mb-0"></p>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Note URL</label>
                    <input type="text" class="form-control" th:field="*{noteUrl}">
                    <div th:if="${#fields.hasErrors('noteUrl')}" class="text-danger small mt-1">
                        <p th:each="error : ${#fields.errors('noteUrl')}" th:text="${error}" class="mb-0"></p>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">ポッドキャスト URL</label>
                    <input type="text" class="form-control" th:field="*{podcastUrl}">
                    <div th:if="${#fields.hasErrors('podcastUrl')}" class="text-danger small mt-1">
                        <p th:each="error : ${#fields.errors('podcastUrl')}" th:text="${error}" class="mb-0"></p>
                    </div>
                </div>

                <button type="submit" class="btn btn-dark">保存する</button>
            </form>
        </div>

        <!-- ログイン情報タブ -->
        <div class="tab-pane fade" id="login">

            <!-- メール変更 -->
            <form th:action="@{/account/email}" method="post" th:object="${emailChangeDto}" class="mb-4">
                <h6 class="mb-3">メールアドレス変更</h6>

                <!-- グローバルエラー -->
                <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger mb-3">
                    <p th:each="error : ${#fields.globalErrors()}" th:text="${error}" class="mb-0"></p>
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted small">現在のメールアドレス</label>
                    <p th:text="${email}" class="fw-bold"></p>
                </div>
                <div class="mb-3">
                    <label class="form-label">新しいメールアドレス</label>
                    <input type="email" class="form-control" th:field="*{newEmail}">
                    <div th:if="${#fields.hasErrors('newEmail')}" class="text-danger small mt-1">
                        <p th:each="error : ${#fields.errors('newEmail')}" th:text="${error}" class="mb-0"></p>
                    </div>
                </div>
                <button type="submit" class="btn btn-dark">変更する</button>
            </form>

            <hr>

            <!-- パスワード変更 -->
            <form th:action="@{/account/password}" method="post" th:object="${passwordChangeDto}" class="mb-4">
                <h6 class="mb-3">パスワード変更</h6>

                <!-- グローバルエラー -->
                <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger mb-3">
                    <p th:each="error : ${#fields.globalErrors()}" th:text="${error}" class="mb-0"></p>
                </div>

                <div class="mb-3">
                    <label class="form-label">現在のパスワード</label>
                    <input type="password" class="form-control" th:field="*{currentPassword}">
                    <div th:if="${#fields.hasErrors('currentPassword')}" class="text-danger small mt-1">
                        <p th:each="error : ${#fields.errors('currentPassword')}" th:text="${error}" class="mb-0"></p>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">新しいパスワード</label>
                    <input type="password" class="form-control" th:field="*{newPassword}">
                    <div th:if="${#fields.hasErrors('newPassword')}" class="text-danger small mt-1">
                        <p th:each="error : ${#fields.errors('newPassword')}" th:text="${error}" class="mb-0"></p>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">新しいパスワード（確認）</label>
                    <input type="password" class="form-control" th:field="*{confirmPassword}">
                    <div th:if="${#fields.hasErrors('confirmPassword')}" class="text-danger small mt-1">
                        <p th:each="error : ${#fields.errors('confirmPassword')}" th:text="${error}" class="mb-0"></p>
                    </div>
                </div>
                <button type="submit" class="btn btn-dark">変更する</button>
            </form>

            <hr>

            <!-- ログアウト -->
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-secondary">ログアウト</button>
            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
