<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${comedian.displayName} + ' - oshibi'">芸人詳細</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .detail-section {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .profile-image-placeholder {
            background: #dee2e6;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6c757d;
            font-size: 0.75rem;
        }
        .sns-link {
            text-decoration: none;
            display: inline-block;
            padding: 4px 12px;
            border: 1px solid #dee2e6;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #495057;
        }
        .sns-link:hover { background: #f8f9fa; color: #212529; }
        .live-row {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 12px 16px;
            transition: box-shadow 0.15s;
        }
        .live-row:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .live-row a { text-decoration: none; color: inherit; }
        .live-title { font-weight: bold; color: #212529; }
    </style>
</head>
<body>

<nav th:replace="~{fragments/header :: header}"></nav>

<div class="container my-4">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb small">
            <li class="breadcrumb-item"><a th:href="@{/comedians}">芸人一覧</a></li>
            <li class="breadcrumb-item active" th:text="${comedian.displayName}"></li>
        </ol>
    </nav>

    <!-- プロフィール -->
    <div class="detail-section">
        <div class="d-flex gap-4 align-items-start">
            <div class="profile-image-placeholder flex-shrink-0">
                画像<br>(第二段階)
            </div>
            <div class="flex-grow-1">
                <div class="d-flex align-items-center gap-2 mb-1">
                    <h4 class="mb-0" th:text="${comedian.displayName}"></h4>
                    <span class="badge bg-secondary" th:text="${comedian.unitType}"></span>
                </div>
                <p class="small text-muted mb-2" th:if="${comedian.memberNames != null}">
                    メンバー：<span th:text="${comedian.memberNames}"></span>
                </p>
                <p class="small mb-2" th:if="${comedian.agency != null}">
                    所属事務所：<span th:text="${comedian.agency}"></span>
                </p>
                <p class="mb-3" th:text="${comedian.description}"></p>

                <!-- SNSリンク -->
                <div class="d-flex flex-wrap gap-2">
                    <a th:if="${comedian.xUrl != null}" th:href="${comedian.xUrl}" class="sns-link" target="_blank">X（Twitter）</a>
                    <a th:if="${comedian.instagramUrl != null}" th:href="${comedian.instagramUrl}" class="sns-link" target="_blank">Instagram</a>
                    <a th:if="${comedian.youtubeUrl != null}" th:href="${comedian.youtubeUrl}" class="sns-link" target="_blank">YouTube</a>
                    <a th:if="${comedian.tiktokUrl != null}" th:href="${comedian.tiktokUrl}" class="sns-link" target="_blank">TikTok</a>
                    <a th:if="${comedian.noteUrl != null}" th:href="${comedian.noteUrl}" class="sns-link" target="_blank">Note</a>
                    <a th:if="${comedian.podcastUrl != null}" th:href="${comedian.podcastUrl}" class="sns-link" target="_blank">ポッドキャスト</a>
                </div>
            </div>
        </div>
    </div>

    <!-- 出演ライブ一覧 -->
    <div class="detail-section">
        <h5 class="mb-3">出演ライブ（今後の予定）</h5>
        <div class="d-flex flex-column gap-2" style="max-height: 400px; overflow-y: auto;">
            <div th:each="live : ${comedian.comedianLives}" class="live-row">
                <a th:href="@{/lives/{liveId}/comedians/{accountId}(liveId=${live.liveId},accountId=${comedian.accountId})}">
                    <div class="d-flex justify-content-between align-items-start">
                        <div class="flex-grow-1">
                            <span th:text="${live.liveTitle}" class="live-title"></span>
                            <span th:text="${live.liveType}" class="badge bg-secondary ms-2"></span>
                        </div>
                        <div class="text-end text-nowrap ms-3">
                            <span class="small">
                                前売 <span th:text="${live.priceAdvance}"></span>円 /
                                当日 <span th:text="${live.priceDoor}"></span>円
                            </span>
                        </div>
                    </div>
                    <div class="mt-1">
                        <span class="small text-muted">
                            <span th:text="${#temporals.format(live.liveDate, 'yyyy/M/d')}"></span>
                            開場 <span th:text="${live.openTime}"></span> /
                            開演 <span th:text="${live.startTime}"></span>
                        </span>
                        <span class="small text-muted ms-3">
                            <span th:text="${live.venue}"></span>（<span th:text="${live.prefecture}"></span>）
                        </span>
                    </div>
                </a>
            </div>
        </div>
    </div>

</div>

<footer class="bg-dark text-white text-center py-3 mt-5">
    <small>&copy; 2026 oshibi</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
