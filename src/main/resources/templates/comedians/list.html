<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/common :: head}"></th:block>
    <title>芸人一覧 - oshibi</title>
    <style>
        .comedian-name {
            font-weight: bold;
            color: #212529;
        }
        .comedian-name:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<!-- ========== ヘッダーナビ ========== -->
<nav th:replace="~{fragments/common :: header}"></nav>

<div class="container my-4">

    <!-- ========== 検索・フィルターセクション ========== -->
    <form class="filter-section mb-4" th:action="@{/comedians}" method="get" th:object="${comedianSearchDto}">

        <!-- キーワード検索 -->
        <div class="row mb-3">
            <div class="col-12">
                <div class="input-group">
                    <input type="text" class="form-control"
                           th:field="*{keyWord}"
                           placeholder="キーワード検索（芸名）">
                    <button class="btn btn-primary" type="submit">検索</button>
                </div>
            </div>
        </div>

        <!-- フィルター行 -->
        <div class="row g-2">
            <div class="col-md-4">
                <label class="form-label small text-muted">活動カテゴリ</label>
                <select class="form-select form-select-sm" th:field="*{unitType}">
                    <option value="">すべて</option>
                    <option value="PIN">ピン</option>
                    <option value="COMBI">コンビ</option>
                    <option value="TRIO">トリオ</option>
                    <option value="GROUP">グループ</option>
                    <option value="STAFF">スタッフ</option>
                    <option value="OTHER">その他</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label small text-muted">所属事務所</label>
                <input type="text" class="form-control form-control-sm"
                       th:field="*{agency}"
                       placeholder="例：サンプルプロダクション">
            </div>
        </div>

    </form>

    <!-- ========== 検索結果ヘッダー ========== -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <p class="text-muted mb-0">検索結果：<strong th:text="${comedianPage.totalElements}">0</strong>件</p>
    </div>

    <!-- ========== ライブ一覧（リスト形式） ========== -->
    <div class="row g-3">
        <div class="col-md-4 col-sm-6" th:each="comedian : ${comedianPage.content}">
            <div class="comedian-card p-3 text-center">
                <a th:href="@{/comedians/detail/{accountId}(accountId=${comedian.accountId})}">
                    <div class="profile-avatar profile-avatar-sm"
                         th:text="${#strings.substring(comedian.displayName, 0, 1)}"></div>
                    <div class="comedian-name" th:text="${comedian.displayName}"></div>
                    <span th:text="${comedian.unitType}"
                          th:class="|badge-unit-type ${comedian.unitTypeBadgeClass}|"></span>
                    <div th:text="${comedian.agency}" class="small text-muted mt-1"></div>
                </a>
            </div>
        </div>
    </div>

    <!-- ========== ページネーション ========== -->
    <nav class="mt-4">
        <ul class="pagination justify-content-center">

            <!-- 前へ -->
            <li class="page-item" th:classappend="${!comedianPage.hasPrevious()} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/comedians(page=${comedianPage.number - 1},
                                    keyWord=${comedianSearchDto.keyWord},
                                    unitType=${comedianSearchDto.unitType},
                                    agency=${comedianSearchDto.agency})}">前へ</a>
            </li>

            <!-- ページ番号 -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, comedianPage.totalPages - 1)}"
                th:if="${comedianPage.totalPages > 0}"
                th:classappend="${i == comedianPage.number} ? 'active'">
                <a class="page-link"
                   th:href="@{/comedians(page=${i},
                                     keyWord=${comedianSearchDto.keyWord},
                                     unitType=${comedianSearchDto.unitType},
                                     agency=${comedianSearchDto.agency})}"
                   th:text="${i + 1}"></a>
            </li>

            <!-- 次へ -->
            <li class="page-item" th:classappend="${!comedianPage.hasNext()} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/comedians(page=${comedianPage.number + 1},
                                     keyWord=${comedianSearchDto.keyWord},
                                     unitType=${comedianSearchDto.unitType},
                                     agency=${comedianSearchDto.agency})}">次へ</a>
            </li>

        </ul>
    </nav>

</div>

<footer th:replace="~{fragments/common :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
