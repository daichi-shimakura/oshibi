<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芸人一覧・検索画面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .filter-section {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 1rem;
        }
        .live-row {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 12px 16px;
            transition: box-shadow 0.15s;
        }
        .live-row:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .live-row a { text-decoration: none; color: inherit; }
        .live-title { font-weight: bold; color: #212529; }
        .performers-text { color: #6c757d; font-size: 0.85rem; }
                body { background: #f5f5f5; }
        .wireframe-note {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }
        .filter-section {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 1rem;
        }
        .comedian-card {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            transition: box-shadow 0.15s;
        }
        .comedian-card:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .comedian-card a {
            text-decoration: none;
            color: inherit;
        }
        .comedian-name {
            font-weight: bold;
            color: #212529;
        }
        .comedian-name:hover {
            text-decoration: underline;
        }
        .profile-image-placeholder {
            background: #dee2e6;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6c757d;
            font-size: 0.7rem;
            margin: 0 auto 0.75rem;
        }
    </style>
</head>
<body>

<!-- ========== ヘッダーナビ ========== -->
<nav th:replace="~{fragments/header :: header}"></nav>

<div class="container my-4">

    <!-- ========== 検索・フィルターセクション ========== -->
    <form class="filter-section mb-4" th:action="@{/comedians}" method="get" th:object="${comedianSearchDto}">

        <!-- キーワード検索 -->
        <div class="row mb-3">
            <div class="col-12">
                <div class="input-group">
                    <input type="text" class="form-control"
                           th:field="*{keyWord}"
                           placeholder="キーワード検索（芸名）">
                    <button class="btn btn-dark" type="submit">検索</button>
                </div>
            </div>
        </div>

        <!-- フィルター行 -->
        <div class="row g-2">
            <div class="col-md-4">
                <label class="form-label small text-muted">活動カテゴリ</label>
                <select class="form-select form-select-sm" th:field="*{unitType}">
                    <option value="">すべて</option>
                    <option value="PIN">ピン</option>
                    <option value="COMBI">コンビ</option>
                    <option value="TRIO">トリオ</option>
                    <option value="GROUP">グループ</option>
                    <option value="STAFF">スタッフ</option>
                    <option value="OTHER">その他</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label small text-muted">所属事務所</label>
                <input type="text" class="form-control form-control-sm"
                       th:field="*{agency}"
                       placeholder="例：サンプルプロダクション">
            </div>
        </div>

    </form>

    <!-- ========== 検索結果ヘッダー ========== -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <p class="text-muted mb-0">検索結果：<strong th:text="${comedianPage.totalElements}">0</strong>件</p>
    </div>

    <!-- ========== ライブ一覧（リスト形式） ========== -->
    <div class="row g-3">
        <div class="col-md-4 col-sm-6" th:each="comedian : ${comedianPage.content}">
            <div class="comedian-card p-3 text-center">
                <a th:href="@{/comedians/detail/{accountId}(accountId=${comedian.accountId})}">
                    <div class="profile-image-placeholder">画像<br>（第二段階）</div>
                    <div class="comedian-name" th:text="${comedian.displayName}"></div>
                    <span th:text="${comedian.unitType}" class="badge bg-secondary mt-1"></span>
                    <div th:text="${comedian.agency}" class="small text-muted mt-1"></div>
                </a>
            </div>
        </div>
    </div>

    <!-- ========== ページネーション ========== -->
    <nav class="mt-4">
        <ul class="pagination justify-content-center">

            <!-- 前へ -->
            <li class="page-item" th:classappend="${!comedianPage.hasPrevious()} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/comedians(page=${comedianPage.number - 1},
                                    keyWord=${comedianSearchDto.keyWord},
                                    unitType=${comedianSearchDto.unitType},
                                    agency=${comedianSearchDto.agency})}">前へ</a>
            </li>

            <!-- ページ番号 -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, comedianPage.totalPages - 1)}"
                th:if="${comedianPage.totalPages > 0}"
                th:classappend="${i == comedianPage.number} ? 'active'">
                <a class="page-link"
                   th:href="@{/comedians(page=${i},
                                     keyWord=${comedianSearchDto.keyWord},
                                     unitType=${comedianSearchDto.unitType},
                                     agency=${comedianSearchDto.agency})}"
                   th:text="${i + 1}"></a>
            </li>

            <!-- 次へ -->
            <li class="page-item" th:classappend="${!comedianPage.hasNext()} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/comedians(page=${comedianPage.number + 1},
                                     keyWord=${comedianSearchDto.keyWord},
                                     unitType=${comedianSearchDto.unitType},
                                     agency=${comedianSearchDto.agency})}">次へ</a>
            </li>

        </ul>
    </nav>

</div>

<!-- ========== フッター ========== -->
<footer class="bg-dark text-white text-center py-3 mt-5">
    <small>&copy; 2026 おしび（仮）</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
